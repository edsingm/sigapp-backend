services:
  back:
    container_name: sigapp-backend
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: prod
    restart: always
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - CENTRAL_DOMAINS=${CENTRAL_DOMAINS}
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - database_sigapp

  redis:
    container_name: sigapp-redis
    image: redis:7-alpine
    restart: always
    networks:
      - database_sigapp

networks:
  database_sigapp:
    external: true
